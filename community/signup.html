<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community User Test</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="container">
    <h1>회원 API 테스트</h1>

    <section class="panel">
      <h2>회원가입</h2>

      <form id="signupForm">
        <input name="email" type="email" placeholder="이메일" required />
        <input name="password" type="password" placeholder="비밀번호" required />
        <input name="passwordConfirm" type="password" placeholder="비밀번호 확인" required />
        <input name="nickname" type="text" placeholder="닉네임" required />
        <input name="profileImageUrl" type="text" placeholder="프로필 이미지 URL 선택" />

        <button type="submit">회원가입</button>
      </form>

      <p id="signupMessage" class="message"></p>
    </section>
  </main>

  <script type="module" src="./js/signupPage.js"></script>
</body>
</html>
