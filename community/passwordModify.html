<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>비밀번호 수정</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <header>
    <h1>비밀번호 수정</h1>
  </header>
  <main>
    <form id="modifyPwForm">
      <div>
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="text" required />
      </div>

      <div>
        <label for="passwordConfirm">비밀번호 확인</label>
        <input id="passwordConfirm" name="passwordConfirm" type="text" />
      </div>

      <button type="submit">수정하기</button>
    </form>

    <p id="message"></p>
  </main>

  <div id="successPopup" hidden>
    수정완료
  </div>

  <script type="module" src="js/pwModifyPage.js"></script>
</body>
</html>
